---
name: Golang
"on":
  # required by gomod-go-version-updater to trigger this action once pr has
  # been reviewed
  pull_request_review:
    types: [submitted]
  push:
permissions:
  contents: read
  packages: read
jobs:
  mcvs-golang-action:
    env:
      TASK_X_REMOTE_TASKFILES: 1
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: schubergphilis/mcvs-golang-action@ae2f6b574119123e8ee0f457a1aace702947931b
        with:
          code-coverage-expected: 62.3
          golang-unit-tests-exclusions: |-
            \(cmd\/prolayout\)
          testing-type: ${{ matrix.testing-type }}
    strategy:
      matrix:
        testing-type:
          - coverage
          - lint
          - security-golang-modules
          - unit
