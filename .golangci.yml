version: "2"
run:
  concurrency: 3
  issues-exit-code: 1
  tests: true
linters:
  default: all
  disable:
    - errname
    - exhaustruct
    - gomodguard
    - mnd
    - nilnil
    - nlreturn
    - paralleltest
    - varnamelen
    - wsl
    - wsl_v5
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/tj/assert
              desc: not allowed, did you mean testify assert?
    dupl:
      threshold: 175
    errcheck:
      check-type-assertions: false
    funlen:
      lines: 80
      statements: 50
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - regexpMust
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 32
    gocyclo:
      min-complexity: 18
    godox:
      keywords:
        - HACK
        - OPTIMIZE
        - TODO
        - BUG
    lll:
      line-length: 200
      tab-width: 2
    misspell:
      locale: UK
      ignore-rules:
        - color
        - center
        - centers
    nakedret:
      max-func-lines: 0
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    revive:
      enable-all-rules: true
      rules:
        - name: add-constant
          disabled: true
        - name: var-naming
          arguments:
            - - ID
            - []
          severity: warning
          disabled: false
        - name: argument-limit
          severity: warning
          disabled: true
        - name: banned-characters
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: file-header
          disabled: true
        - name: cognitive-complexity
          arguments:
            - 15
          disabled: false
        - name: unused-receiver
          disabled: true
        - name: function-length
          arguments:
            - 30
            - 0
          disabled: false
        - name: line-length-limit
          disabled: true
        - name: cyclomatic
          arguments:
            - 7
          disabled: false
        - name: function-result-limit
          arguments:
            - 3
          severity: warning
          disabled: false
        - name: import-alias-naming
          arguments:
            - ^[a-z][a-z0-9A-Z]{0,}$
          severity: warning
          disabled: false
        - name: package-naming
          disabled: true
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    rules:
      - linters:
          - funlen
          - goconst
        path: _test\.go
      - linters:
          - staticcheck
        text: 'SA9003:'
      - linters:
          - lll
        text: '^//go:generate '
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
severity:
  default: error
  rules:
    - linters:
        - gomodguard_v2
      severity: warning
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/wimspaargaren/prolayout)
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
